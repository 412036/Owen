<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>珍藏大師 TreasureMaster - 雲端收藏管理</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #F8FAFC; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        .loader { border-top-color: transparent; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- 通知系統 -->
    <div id="notification" class="fixed top-8 left-1/2 -translate-x-1/2 z-50 hidden transition-all duration-300">
        <div id="notification-card" class="flex items-center space-x-4 px-8 py-4 rounded-3xl shadow-2xl border-2 bg-white">
            <div id="notif-spinner" class="w-5 h-5 border-2 border-blue-600 border-t-transparent animate-spin rounded-full"></div>
            <i id="notif-icon" data-lucide="check-circle-2" class="hidden text-green-600"></i>
            <span id="notif-text" class="font-black text-sm uppercase tracking-widest text-blue-600">處理中...</span>
        </div>
    </div>

    <!-- 側邊導覽列 -->
    <aside class="w-72 bg-white border-r border-slate-100 flex flex-col p-8 space-y-10 shrink-0">
        <div class="flex items-center space-x-3 px-2">
            <div class="bg-blue-600 p-2 rounded-2xl shadow-lg shadow-blue-100">
                <i data-lucide="database" class="text-white"></i>
            </div>
            <h1 class="text-2xl font-black tracking-tighter text-slate-900">珍藏大師</h1>
        </div>
        
        <nav class="flex-1 space-y-3">
            <button onclick="switchTab('dashboard')" id="nav-dashboard" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all bg-blue-600 text-white shadow-lg">
                <i data-lucide="layout-grid"></i>
                <span class="font-medium text-sm">控制面板總覽</span>
            </button>
            <button onclick="switchTab('collections')" id="nav-collections" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-gray-500 hover:bg-gray-100">
                <i data-lucide="database"></i>
                <span class="font-medium text-sm">個人資產庫</span>
            </button>
            <button onclick="switchTab('wishlist')" id="nav-wishlist" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-gray-500 hover:bg-gray-100">
                <i data-lucide="heart"></i>
                <span class="font-medium text-sm">願望與市場追蹤</span>
            </button>
            <button onclick="switchTab('analysis')" id="nav-analysis" class="nav-item w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition-all text-gray-500 hover:bg-gray-100">
                <i data-lucide="trending-up"></i>
                <span class="font-medium text-sm">資產價值動態</span>
            </button>
        </nav>

        <div class="pt-8 border-t border-slate-50">
            <div id="auth-section">
                <button id="btn-login" class="w-full flex items-center justify-center space-x-2 p-4 bg-blue-600 rounded-2xl text-white font-bold hover:bg-blue-700 shadow-lg transition-all">
                    <i data-lucide="log-in"></i>
                    <span>Google 登入同步</span>
                </button>
            </div>
        </div>
    </aside>

    <!-- 主內容區 -->
    <main class="flex-1 flex flex-col overflow-hidden">
        <header class="h-24 flex items-center justify-between px-12 shrink-0">
            <div class="relative w-[480px]">
                <i data-lucide="search" class="absolute left-5 top-1/2 -translate-y-1/2 text-gray-300"></i>
                <input type="text" placeholder="搜尋您的雲端收藏..." class="w-full bg-slate-100 border-none rounded-2xl py-3.5 pl-14 pr-6 text-sm font-bold outline-none">
            </div>
            <div class="flex items-center space-x-6">
                <div class="text-right hidden sm:block">
                    <p class="text-xs font-black text-slate-400 uppercase tracking-widest">目前帳號</p>
                    <p id="user-name" class="text-sm font-bold text-slate-700">訪客模式</p>
                </div>
                <div class="w-12 h-12 rounded-full overflow-hidden ring-4 ring-white shadow-sm">
                    <img id="user-avatar" src="https://api.dicebear.com/7.x/avataaars/svg?seed=default" alt="User">
                </div>
            </div>
        </header>

        <div class="flex-1 overflow-y-auto px-12 pb-12">
            <!-- Dashboard Tab -->
            <div id="tab-dashboard" class="tab-content active space-y-8 animate-in fade-in duration-500">
                <h2 class="text-2xl font-black">歡迎回來，<span id="welcome-name">收藏家</span></h2>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-8">
                    <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-50 h-40 flex flex-col justify-between">
                        <p class="text-slate-400 text-[10px] font-black uppercase">私有藏品數量</p>
                        <h3 class="text-4xl font-black text-blue-600"><span id="stats-count">0</span> <span class="text-lg text-slate-400">件</span></h3>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-50 h-40 flex flex-col justify-between">
                        <p class="text-slate-400 text-[10px] font-black uppercase">雲端同步狀態</p>
                        <h3 class="text-xl font-black text-green-500 flex items-center space-x-2">
                            <i data-lucide="shield-check"></i> <span>已加密連接</span>
                        </h3>
                    </div>
                    <div class="bg-white p-8 rounded-[32px] shadow-sm border border-slate-50 h-40 flex flex-col justify-between">
                        <p class="text-slate-400 text-[10px] font-black uppercase">資產總估值</p>
                        <h3 class="text-2xl font-black text-slate-700">NT$ <span id="stats-value">0</span></h3>
                    </div>
                </div>
            </div>

            <!-- Collections Tab -->
            <div id="tab-collections" class="tab-content space-y-8">
                <div class="flex justify-between items-center">
                    <h2 class="text-2xl font-black">個人資產庫 <span id="col-count-title">(0)</span></h2>
                    <button onclick="document.getElementById('file-input').click()" class="bg-blue-600 text-white px-6 py-3 rounded-2xl font-black text-sm flex items-center space-x-2 hover:bg-blue-700 transition-all shadow-xl shadow-blue-100">
                        <i data-lucide="plus"></i><span>新增雲端資產</span>
                    </button>
                </div>
                <div id="collections-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-8">
                    <!-- Cards will be injected here -->
                </div>
            </div>

            <!-- Wishlist Tab -->
            <div id="tab-wishlist" class="tab-content text-center py-24">
                <i data-lucide="heart" class="mx-auto text-slate-200 mb-4" size="64"></i>
                <p class="text-slate-400 font-black uppercase tracking-widest">願望清單目前為空</p>
            </div>

            <!-- Analysis Tab -->
            <div id="tab-analysis" class="tab-content space-y-8">
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                    <div class="bg-white p-10 rounded-[40px] border border-slate-50 shadow-sm">
                        <h3 class="font-black text-xl mb-6 flex items-center space-x-2"><i data-lucide="pie-chart" class="text-blue-600"></i><span>資產類別佔比</span></h3>
                        <div class="h-64 flex items-center justify-center bg-slate-50 rounded-[32px] border-2 border-dashed border-slate-100">
                            <p class="text-slate-400 font-bold text-sm">正在分析市場動態數據...</p>
                        </div>
                    </div>
                    <div class="bg-gradient-to-br from-blue-600 to-blue-800 p-10 rounded-[40px] text-white">
                        <i data-lucide="target" class="mb-6" size="32"></i>
                        <h3 class="text-2xl font-black mb-4">智慧投資建議</h3>
                        <p class="text-blue-100 mb-8 leading-relaxed">我們偵測到您的收藏中「鐘錶類」的市場價值正在上升，建議定期更新鑑定報告以維持資產正確估值。</p>
                        <button class="w-full bg-white text-blue-700 py-4 rounded-2xl font-black hover:bg-blue-50 transition-all">生成完整報告</button>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <input type="file" id="file-input" class="hidden" accept="image/*">

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, GoogleAuthProvider, signInWithPopup, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAV1feMf2mG9yTHN4bnvTSCUwB6VyWSakM",
            authDomain: "owen-a263b.firebaseapp.com",
            projectId: "owen-a263b",
            storageBucket: "owen-a263b.firebasestorage.app",
            messagingSenderId: "1013481513026",
            appId: "1:1013481513026:web:afda76b6571506a4734ddb",
            measurementId: "G-JEMCSLPLT2"
        };

        // 初始化
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "default-app-id";

        let currentUser = null;

        // UI 切換邏輯
        window.switchTab = (tabId) => {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(nav => {
                nav.classList.remove('bg-blue-600', 'text-white', 'shadow-lg');
                nav.classList.add('text-gray-500', 'hover:bg-gray-100');
            });

            document.getElementById(`tab-${tabId}`).classList.add('active');
            const activeNav = document.getElementById(`nav-${tabId}`);
            activeNav.classList.remove('text-gray-500', 'hover:bg-gray-100');
            activeNav.classList.add('bg-blue-600', 'text-white', 'shadow-lg');
        };

        // 通知切換
        const showNotif = (text, isSuccess = false) => {
            const el = document.getElementById('notification');
            const card = document.getElementById('notification-card');
            const spinner = document.getElementById('notif-spinner');
            const icon = document.getElementById('notif-icon');
            const txt = document.getElementById('notif-text');

            el.classList.remove('hidden');
            txt.innerText = text;

            if (isSuccess) {
                spinner.classList.add('hidden');
                icon.classList.remove('hidden');
                card.classList.add('border-green-500');
                txt.classList.replace('text-blue-600', 'text-green-600');
                setTimeout(() => el.classList.add('hidden'), 3000);
            } else {
                spinner.classList.remove('hidden');
                icon.classList.add('hidden');
                card.classList.remove('border-green-500');
                txt.classList.add('text-blue-600');
            }
        };

        // 監聽登入狀態
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                document.getElementById('user-name').innerText = user.displayName || (user.isAnonymous ? "訪客模式" : "已登入用戶");
                document.getElementById('welcome-name').innerText = user.displayName || "收藏家";
                document.getElementById('user-avatar').src = user.photoURL || `https://api.dicebear.com/7.x/avataaars/svg?seed=${user.uid}`;
                
                updateAuthButton(true);
                startDataListener(user.uid);
            } else {
                signInAnonymously(auth);
            }
        });

        const updateAuthButton = (isLoggedIn) => {
            const container = document.getElementById('auth-section');
            if (isLoggedIn && !auth.currentUser.isAnonymous) {
                container.innerHTML = `
                    <button onclick="handleLogout()" class="w-full flex items-center justify-center space-x-2 p-4 bg-slate-100 rounded-2xl text-slate-600 font-bold hover:bg-red-50 hover:text-red-600 transition-all">
                        <i data-lucide="log-out"></i>
                        <span>登出系統</span>
                    </button>
                `;
            } else {
                container.innerHTML = `
                    <button onclick="handleLogin()" class="w-full flex items-center justify-center space-x-2 p-4 bg-blue-600 rounded-2xl text-white font-bold hover:bg-blue-700 shadow-lg transition-all">
                        <i data-lucide="log-in"></i>
                        <span>Google 登入同步</span>
                    </button>
                `;
            }
            lucide.createIcons();
        };

        window.handleLogin = async () => {
            const provider = new GoogleAuthProvider();
            try { await signInWithPopup(auth, provider); } catch(e) { console.error(e); }
        };

        window.handleLogout = () => signOut(auth);

        // 資料監聽
        const startDataListener = (uid) => {
            const colRef = collection(db, 'artifacts', appId, 'users', uid, 'collections');
            onSnapshot(colRef, (snapshot) => {
                const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                renderCollections(data);
                updateStats(data);
            });
        };

        const renderCollections = (data) => {
            const grid = document.getElementById('collections-grid');
            document.getElementById('col-count-title').innerText = `(${data.length})`;
            grid.innerHTML = data.map(item => `
                <div class="bg-white rounded-[32px] shadow-sm border border-slate-50 overflow-hidden group hover:shadow-xl transition-all animate-in fade-in zoom-in duration-300">
                    <div class="h-56 relative overflow-hidden bg-slate-100">
                        <img src="${item.img}" class="w-full h-full object-cover group-hover:scale-110 transition-transform duration-700">
                        <div class="absolute bottom-4 left-4 flex space-x-1">
                            ${(item.tags || []).map(tag => `<span class="text-[10px] font-black bg-black/50 text-white px-2 py-1 rounded-md backdrop-blur-sm uppercase">${tag}</span>`).join('')}
                        </div>
                    </div>
                    <div class="p-6">
                        <h4 class="font-black text-slate-800 mb-4 truncate">${item.title}</h4>
                        <div class="flex justify-between items-center border-t border-slate-50 pt-4">
                            <span class="text-xs font-bold text-slate-400">${item.date}</span>
                            <span class="text-blue-600 font-black text-sm">${item.price || 'NT$ 0'}</span>
                        </div>
                    </div>
                </div>
            `).join('');
            
            if (data.length === 0) {
                grid.innerHTML = `<div class="col-span-full py-24 text-center text-slate-300">目前尚無收藏，點擊上方按鈕開始新增</div>`;
            }
        };

        const updateStats = (data) => {
            document.getElementById('stats-count').innerText = data.length;
            const total = data.reduce((acc, curr) => {
                const val = parseInt(String(curr.price).replace(/[^0-9]/g, '')) || 0;
                return acc + val;
            }, 0);
            document.getElementById('stats-value').innerText = total.toLocaleString();
        };

        // 檔案處理
        document.getElementById('file-input').addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file || !currentUser) return;

            showNotif(`處理中: ${file.name}`);
            const reader = new FileReader();
            reader.onloadend = async () => {
                try {
                    await addDoc(collection(db, 'artifacts', appId, 'users', currentUser.uid, 'collections'), {
                        title: file.name.split('.')[0],
                        img: reader.result,
                        date: new Date().toISOString().split('T')[0],
                        price: "NT$ 待鑑定",
                        tags: ["新上傳", "雲端備份"],
                        timestamp: Date.now()
                    });
                    showNotif("已成功同步至雲端", true);
                } catch (err) {
                    console.error(err);
                }
            };
            reader.readAsDataURL(file);
        });

        // 初始化圖標
        lucide.createIcons();

    </script>
</body>
</html>
